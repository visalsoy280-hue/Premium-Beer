<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beer Premium</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #0a0a0a;
        color: white;
        font-family: sans-serif;
      }

      /* NAV */
      .navbar {
        background: black;
        border-bottom: 1px solid gold;
      }
      .logo {
        color: gold;
        font-weight: bold;
      }

      /* HERO */
      .hero {
        height: 350px;
        background: url("photo/bg.jpg") no-repeat center/cover;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .hero-title {
        color: #f6ce1b;
        font-size: 42px;
        font-weight: bold;
      }
      .hero-sub {
        color: #f7690a;
      }

      /* CARD */
      .card {
        background: #151515;
        border-radius: 14px;
        text-align: center;
        padding: 12px;
        transition: 0.3s;
        overflow: hidden;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      }

      /* IMAGE FIX */
      .card-img {
        width: 100%;
        height: 200px;
        overflow: hidden;
        border-radius: 12px;
      }
      .card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.4s;
      }
      .card:hover img {
        transform: scale(1.1);
      }

      .card h6 {
        margin-top: 10px;
      }
      .card p {
        color: gold;
        font-weight: bold;
      }

      /* BUTTON */
      .btn-gold {
        background: gold;
        color: black;
        border: none;
        border-radius: 8px;
      }

      /* CART */
      .cart-box {
        position: fixed;
        right: -350px;
        top: 0;
        width: 320px;
        height: 100%;
        background: #111;
        padding: 20px;
        transition: 0.3s;
        overflow-y: auto;
        z-index: 999;
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
      }
      .cart-box.active {
        right: 0;
      }

      /* OVERLAY */
      #overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        z-index: 998;
      }
      #overlay.active {
        display: block;
      }

      /* CART ITEM */
      .cart-item {
        background: #1a1a1a;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 10px;
      }
      .cart-item button {
        padding: 3px 8px;
        border: none;
        border-radius: 6px;
        background: #333;
        color: white;
      }

      /* CHECKOUT */
      .checkout {
        display: none;
        padding: 50px;
      }
      .checkout-box {
        background: #121212;
        padding: 20px;
        border-radius: 12px;
      }

      /* CONTACT */
      .contact-box {
        background: #121212;
        padding: 20px;
        border-radius: 12px;
      }
      .contact-box input,
      .contact-box textarea {
        background: #1c1c1c;
        border: none;
        color: white;
      }
    </style>
  </head>

  <body>
    <!-- NAV -->
    <nav class="navbar p-3">
      <div class="container d-flex justify-content-between">
        <div class="d-flex gap-2 align-items-center">
          <img src="photo/logo.jpg" width="40" />
          <h4 class="logo">Beer Premium</h4>
        </div>

        <div id="cart-btn" style="cursor: pointer">
          🛒 <span id="cart-count">0</span>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <div class="hero">
      <div>
        <h1 class="hero-title">Premium Beer Pub</h1>
        <p class="hero-sub">When life hurt, beer hail.</p>
      </div>
    </div>

    <!-- PRODUCTS -->
    <div class="container mt-5">
      <div class="row" id="product-list"></div>
    </div>

    <!-- OVERLAY -->
    <div id="overlay"></div>

    <!-- CART -->
    <div class="cart-box" id="cart-box">
      <h5>Cart</h5>
      <div id="cart-items"></div>
      <button onclick="goCheckout()" class="btn btn-gold w-100 mt-2">
        Checkout
      </button>
    </div>

    <!-- CHECKOUT -->
    <div class="container checkout" id="checkout">
      <h2 class="text-center mb-4">💳 Checkout</h2>

      <div class="row">
        <div class="col-md-6">
          <div class="checkout-box">
            <input class="form-control mb-2" placeholder="Name" />
            <input class="form-control mb-2" placeholder="Phone" />
            <input class="form-control mb-2" placeholder="Address" />
          </div>
        </div>

        <div class="col-md-6">
          <div class="checkout-box">
            <div id="summary"></div>
            <h4 id="total"></h4>
            <button onclick="placeOrder()" class="btn btn-gold w-100">
              Place Order
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- CONTACT -->
    <div class="container mt-5">
      <h2 class="text-center mb-4">📞 Contact Us</h2>

      <div class="row">
        <div class="col-md-6">
          <div class="contact-box">
            <p>Email: beer@shop.com</p>
            <p>Phone: +855 12 345 678</p>
            <p>Location: Phnom Penh</p>
          </div>
        </div>

        <div class="col-md-6">
          <div class="contact-box">
            <input class="form-control mb-2" placeholder="Your Name" />
            <input class="form-control mb-2" placeholder="Your Email" />
            <textarea
              class="form-control mb-2"
              placeholder="Message"
            ></textarea>
            <button class="btn btn-gold w-100">Send</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      /* PRODUCTS */
      let products = [
        {
          id: 1,
          name: "Heineken",
          price: 2.5,
          img: "photo/heineken.jpg",
        },
        {
          id: 2,
          name: "Corona",
          price: 3,
          img: "photo/corona.jpg",
        },
        {
          id: 3,
          name: "Budweiser",
          price: 2,
          img: "photo/budweiser.jpg",
        },
        {
          id: 4,
          name: "Tiger",
          price: 2.2,
          img: "photo/tiger.jpg",
        },
        {
          id: 5,
          name: "Guinness",
          price: 3.5,
          img: "photo/guinness.jpg",
        },
        {
          id: 6,
          name: "Asahi",
          price: 3,
          img: "photo/asahi.jpg",
        },
        {
          id: 7,
          name: "Stella",
          price: 2.8,
          img: "photo/stella.jpg",
        },
        {
          id: 8,
          name: "Craft Beer",
          price: 4,
          img: "photo/craft-beer.jpg",
        },
      ];

      let cart = [];

      /* RENDER */
      function renderProducts() {
        let html = "";
        products.forEach((p) => {
          html += `
<div class="col-md-3 mb-4">
<div class="card">

<div class="card-img">
<img src="${p.img}">
</div>

<h6>${p.name}</h6>
<p>$${p.price}</p>

<button onclick="add(${p.id})" class="btn btn-gold">Add</button>

</div>
</div>`;
        });
        document.getElementById("product-list").innerHTML = html;
      }

      /* ADD */
      function add(id) {
        let p = products.find((x) => x.id === id);
        let item = cart.find((x) => x.id === id);
        item ? item.qty++ : cart.push({ ...p, qty: 1 });
        renderCart();
        openCart();
      }

      /* CART */
      function renderCart() {
        let html = "",
          total = 0,
          count = 0;

        cart.forEach((p) => {
          total += p.price * p.qty;
          count += p.qty;

          html += `
<div class="cart-item d-flex justify-content-between">
<div>${p.name}<br>$${p.price} x ${p.qty}</div>
<div>
<button onclick="qty(${p.id},-1)">-</button>
<button onclick="qty(${p.id},1)">+</button>
<button onclick="removeItem(${p.id})">x</button>
</div>
</div>`;
        });

        html += `<hr>Total $${total}`;

        document.getElementById("cart-items").innerHTML = html;
        document.getElementById("cart-count").innerText = count;

        renderSummary();
      }

      function qty(id, n) {
        let item = cart.find((p) => p.id === id);
        item.qty += n;
        if (item.qty <= 0) cart = cart.filter((p) => p.id !== id);
        renderCart();
      }

      function removeItem(id) {
        cart = cart.filter((p) => p.id !== id);
        renderCart();
      }

      /* CART OPEN/CLOSE */
      function openCart() {
        document.getElementById("cart-box").classList.add("active");
        document.getElementById("overlay").classList.add("active");
      }
      function closeCart() {
        document.getElementById("cart-box").classList.remove("active");
        document.getElementById("overlay").classList.remove("active");
      }

      document.getElementById("cart-btn").onclick = openCart;
      document.getElementById("overlay").onclick = closeCart;

      document.addEventListener("click", function (e) {
        let cart = document.getElementById("cart-box");
        let btn = document.getElementById("cart-btn");
        if (
          cart.classList.contains("active") &&
          !cart.contains(e.target) &&
          !btn.contains(e.target)
        ) {
          closeCart();
        }
      });

      /* CHECKOUT */
      function goCheckout() {
        document.getElementById("checkout").style.display = "block";
        document
          .getElementById("checkout")
          .scrollIntoView({ behavior: "smooth" });
        closeCart();
      }

      /* SUMMARY */
      function renderSummary() {
        let html = "",
          total = 0;
        cart.forEach((p) => {
          let sub = p.price * p.qty;
          total += sub;
          html += `<div>${p.name} x ${p.qty} = $${sub}</div>`;
        });
        document.getElementById("summary").innerHTML = html;
        document.getElementById("total").innerText = "Total $" + total;
      }

      /* ORDER */
      function placeOrder() {
        alert("Order success 🍺");
        cart = [];
        renderCart();
        document.getElementById("checkout").style.display = "none";
      }

      /* INIT */
      renderProducts();
    </script>
  </body>
</html>
